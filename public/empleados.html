<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Empleados | LASA</title><link rel="stylesheet" href="style.css"></head>
<body data-page="empleados">
  <header class="topbar"><div><p class="eyebrow">LASA · Recursos Humanos</p><h1>Gestor de empleados</h1></div><div class="topbar-actions"><button id="theme-toggle" class="theme-toggle" type="button"><span aria-hidden="true">◐</span><span class="theme-label">Modo oscuro</span></button><p id="status" class="status" aria-live="polite">Listo</p></div></header>
  <nav class="main-nav" aria-label="Navegación principal"><a href="index.html">Inicio</a><a class="active" href="empleados.html">Empleados</a><a href="permisos.html">Permisos</a><a href="vacaciones.html">Vacaciones</a></nav>
  <main><section class="page-heading"><div><p class="eyebrow">Equipo</p><h2>Empleados</h2><p>Alta, edición y consulta de la nómina de LASA.</p></div><button id="new-employee" class="button">+ Nuevo empleado</button></section>
    <section class="panel"><div class="table-wrap"><table><thead><tr><th>Legajo</th><th>Empleado</th><th>DNI</th><th>CUIL</th><th>Puesto</th><th>Ingreso</th><th aria-label="Acciones"></th></tr></thead><tbody id="employees-list"></tbody></table></div><p id="employees-empty" class="empty">Todavía no hay empleados cargados.</p></section>
  </main>
  <dialog id="employee-dialog"><form id="employee-form" method="dialog"><div class="dialog-heading"><h2 id="employee-dialog-title">Nuevo empleado</h2><button type="button" class="icon-button" data-close aria-label="Cerrar">×</button></div><input type="hidden" id="employee-id"><div class="form-grid"><label>N° de legajo<input id="legajo" name="legajo" required inputmode="numeric" maxlength="20"></label><label>Nombre<input id="nombre" name="nombre" required maxlength="80"></label><label>Apellido<input id="apellido" name="apellido" required maxlength="80"></label><label>DNI<input id="dni" name="dni" required maxlength="30"></label><label>Sexo<select id="sexo" name="sexo" required><option value="">Seleccionar</option><option value="masculino">Masculino</option><option value="femenino">Femenino</option><option value="otro">Otro / asignado por ANSES</option></select></label><label>CUIL<input id="cuil" name="cuil" required inputmode="numeric" maxlength="13" placeholder="20-12345678-6" aria-describedby="cuil-help cuil-warning"><small id="cuil-help">Se genera con DNI + sexo, pero podés editarlo manualmente.</small><small id="cuil-warning" class="field-warning" hidden>El CUIL no pasa la validación del dígito verificador.</small></label><label>Puesto<input id="puesto" name="puesto" required maxlength="100"></label><label>Email<input id="email" name="email" type="email" maxlength="120"></label><label>Fecha de ingreso<input id="fechaIngreso" name="fechaIngreso" type="date"></label></div><p id="employee-form-error" class="form-error" role="alert" hidden></p><div class="dialog-actions"><button type="button" class="button button-secondary" data-close>Cancelar</button><button class="button">Guardar empleado</button></div></form></dialog>
  <script src="/shared/cuil.js"></script>
  <script src="script.js"></script>
</body></html>
