<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Permisos | LASA</title><link rel="stylesheet" href="style.css"></head>
<body data-page="permisos"><header class="topbar"><div><p class="eyebrow">LASA · Recursos Humanos</p><h1>Gestor de empleados</h1></div><div class="topbar-actions"><button id="theme-toggle" class="theme-toggle" type="button"><span aria-hidden="true">◐</span><span class="theme-label">Modo oscuro</span></button><p id="status" class="status" aria-live="polite">Listo</p></div></header><nav class="main-nav" aria-label="Navegación principal"><a href="index.html">Inicio</a><a href="empleados.html">Empleados</a><a class="active" href="permisos.html">Permisos</a><a href="vacaciones.html">Vacaciones</a></nav>
<main><section class="page-heading"><div><p class="eyebrow">Ausencias</p><h2>Permisos</h2><p>Registrá y consultá permisos del personal.</p></div><button class="button" data-open="permission-dialog">+ Registrar permiso</button></section><section class="panel"><ul id="permisos-list" class="records"></ul><p id="permisos-empty" class="empty">No hay permisos registrados.</p></section></main>
<dialog id="permission-dialog"><form id="permission-form" method="dialog"><div class="dialog-heading"><h2>Registrar permiso</h2><button type="button" class="icon-button" data-close aria-label="Cerrar">×</button></div><div class="form-grid"><label>Empleado<select name="empleadoId" required class="employee-select"></select></label><label>Motivo<input name="motivo" required maxlength="120" placeholder="Ej.: Trámite personal"></label><label>Desde<input name="fechaDesde" type="date" required></label><label>Hasta<input name="fechaHasta" type="date" required></label><label class="full-width">Observaciones<textarea name="observaciones" rows="3" maxlength="500"></textarea></label></div><div class="dialog-actions"><button type="button" class="button button-secondary" data-close>Cancelar</button><button class="button">Guardar permiso</button></div></form></dialog><script src="script.js"></script></body></html>
